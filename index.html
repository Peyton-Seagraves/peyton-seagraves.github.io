<body style=" background-attachment:fixed; background-size: cover; background-repeat: no-repeat; background-image: url(https://media.istockphoto.com/id/462881839/photo/epic-super-cell-storm-cloud.jpg?s=612x612&w=0&k=20&c=66lBv3Ybh1b4cNhAyQaRwekC7fpgr2vg8Er49HWyDr4=);">
    <div class="d-flex justify-content-center align-items-center">
        <div class="card col-11 col-md-5" id="divCurrentWeather" style="font-size: x-large;">

                <h1 class="text-center mb-4">Cookeville weather</h1>

                </div>

            </div>
        </div>

        <h5 class="text-center fw-bolder" style="color: white;">Weather data provided by open-meteo API, picture from https://media.istockphoto.com/id/462881839/photo/epic-super-cell-storm-cloud.jpg?s=612x612&w=0&k=20&c=66lBv3Ybh1b4cNhAyQaRwekC7fpgr2vg8Er49HWyDr4=</h5>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        fetch('https://api.open-meteo.com/v1/forecast?latitude=36.16&longitude=-85.5&daily=weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,sunrise,sunset,wind_speed_10m_max,wind_gusts_10m_max,rain_sum,showers_sum,snowfall_sum,precipitation_probability_max&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation_probability,precipitation,rain,showers,snowfall,snow_depth,visibility,wind_speed_10m,is_day&current=temperature_2m,is_day,relative_humidity_2m,apparent_temperature,precipitation,rain,showers,snowfall,wind_speed_10m&timezone=America%2FChicago&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch')
        .then(response => {
            if(!response.ok){
                throw new Error('Bad HTTP Response')
            }
            return response.json()
        })
        .then(data => {
            
            //data for Current Weather
            document.querySelector("#txtCurrentTemperature").innerHTML = `<p>Current Temperature: ${data.current.temperature_2m}${data.current_units.temperature_2m} (Feels like ${data.current.apparent_temperature}${data.current_units.apparent_temperature})</p>`
            document.querySelector("#txtCurrentPrecipitation").innerHTML =  `<p>Current Precipitation: ${data.current.precipitation} ${data.current_units.precipitation}</p>`
            document.querySelector("#txtCurrentHumidity").innerHTML =  `<p>Current Humidity: ${data.current.relative_humidity_2m}${data.current_units.relative_humidity_2m}</p>`

            //data for 7 day forecast
            //day counter for loop
            let intDay = 0
            //loop to display days 1 through 7
            while (intDay < 7){
            document.querySelector(`#txtDay${intDay+1}Date`).innerHTML = `<h5>${data.daily.time[intDay]}</h5>`
            document.querySelector(`#txtDay${intDay+1}HighTemperature`).innerHTML = `<p>${data.daily.temperature_2m_max[intDay]}${data.current_units.temperature_2m}</p>`
            document.querySelector(`#txtDay${intDay+1}LowTemperature`).innerHTML = `<p>${data.daily.temperature_2m_min[intDay]}${data.current_units.temperature_2m}</p>`
            document.querySelector(`#txtDay${intDay+1}PrecipitationChance`).innerHTML = `<p>${data.daily.precipitation_probability_max[intDay]}%</p>`
            intDay = intDay + 1
            }

        })


        //add aria-labels to i tags later
    </script>
